plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.smooth.island'

    defaultConfig {
        applicationId "com.smooth.island"
        minSdk 31
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
